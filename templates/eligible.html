{% extends 'base.html' %}
{% block content %}

<h3>Eligible Students</h3>

{% for item in data %}
<div class="card p-3 mb-3 shadow">
<h5>{{ item.company }}</h5>

{% for s in item.students %}
<span class="badge bg-dark">
{{ s[1] }}
<a href="/delete_student/{{ s[0] }}" style="color:red;"> ❌</a>
</span>
{% endfor %}

</div>
{% endfor %}

{% endblock %}
